<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FB Comment Scraper - Side Panel</title>
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --accent: #06b6d4;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --danger: #ef4444;
      --success: #10b981;
      --warning: #f59e0b;
      --border: #1e293b;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      box-sizing: border-box;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    * {
      box-sizing: border-box;
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-dark);
    }
    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }

    /* Header */
    .header {
      padding: 16px 20px;
      background: linear-gradient(135deg, #1e1b4b, #0f172a);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      position: relative;
    }

    .header-logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      margin-right: 12px;
      box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
      overflow: hidden;
      flex: 0 0 32px;
    }

    .header-logo img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .header-title h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      color: #f8fafc;
    }

    .header-title p {
      margin: 2px 0 0 0;
      font-size: 11px;
      color: var(--text-muted);
    }

    /* Body Container */
    .panel-body {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Connection Card */
    .connection-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--text-muted);
    }

    .status-dot.active {
      background-color: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    .status-dot.selecting {
      background-color: var(--warning);
      box-shadow: 0 0 8px var(--warning);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }

    /* Buttons */
    .btn {
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-select {
      background-color: #334155;
      color: #f8fafc;
      border: 1px solid #475569;
      width: 100%;
    }

    .btn-select:hover:not(:disabled) {
      background-color: #475569;
    }

    .btn-select.selecting {
      background-color: #78350f;
      color: #fef3c7;
      border-color: #d97706;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    }

    .btn-danger {
      background-color: var(--danger);
      color: white;
    }

    .btn-danger:hover:not(:disabled) {
      background-color: #dc2626;
    }

    .btn-export {
      background-color: #0284c7;
      color: white;
    }

    .btn-export:hover:not(:disabled) {
      background-color: #0369a1;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Option Items */
    .section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 8px;
      margin-top: 4px;
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background-color: rgba(30, 41, 59, 0.4);
      border-radius: 10px;
      padding: 12px;
      border: 1px solid var(--border);
    }

    .option-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }

    .option-item label {
      cursor: pointer;
      flex: 1;
      user-select: none;
    }

    .option-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--primary);
    }

    .option-item input[type="number"] {
      width: 65px;
      padding: 4px 6px;
      background-color: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      color: white;
      font-size: 12px;
      text-align: center;
    }

    .export-fields-menu {
      background-color: rgba(30, 41, 59, 0.4);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .btn-export-fields {
      cursor: pointer;
      width: 100%;
      border: none;
      background: #172033;
      color: var(--text-main);
      padding: 12px;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
      font-family: inherit;
    }

    .btn-export-fields:hover {
      background: #253248;
    }

    .export-field-summary-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .export-field-count {
      color: var(--accent);
      font-size: 11px;
    }

    .export-fields-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 12px;
      border-top: 1px solid var(--border);
    }

    .export-fields-grid[hidden] {
      display: none;
    }

    .export-field-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-main);
    }

    .export-field-item input {
      accent-color: var(--primary);
    }

    .export-field-actions {
      grid-column: 1 / -1;
      display: flex;
      gap: 8px;
      padding-top: 4px;
    }

    .btn-field-action {
      flex: 1;
      padding: 5px 8px;
      border: 1px solid #334155;
      border-radius: 6px;
      background: #0f172a;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 11px;
    }

    .controls-row {
      display: flex;
      gap: 10px;
    }

    .controls-row .btn {
      flex: 1;
      height: 38px;
    }

    /* Stats Dashboard */
    .stats-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .stat-card {
      background-color: rgba(30, 41, 59, 0.5);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .stat-val {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-lbl {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Log Monitor */
    .log-monitor {
      background-color: #020617;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      height: 110px;
      font-family: monospace;
      font-size: 11px;
      color: #38bdf8;
      overflow-y: auto;
      white-space: pre-wrap;
      line-height: 1.4;
    }

    /* Live Preview Section */
    .preview-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 180px;
    }

    .preview-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .btn-lock-preview {
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 4px 8px;
      background: #172033;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
    }

    .btn-lock-preview[aria-pressed="true"] {
      color: #a7f3d0;
      border-color: var(--success);
      background: rgba(16, 185, 129, 0.12);
    }

    .btn-lock-preview:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .preview-list {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 8px;
      background-color: rgba(15, 23, 42, 0.6);
      overflow-y: auto;
      max-height: 280px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .preview-empty {
      color: #64748b;
      font-size: 12px;
      text-align: center;
      padding: 30px 0;
      margin: auto;
    }

    /* Comment Cards */
    .comment-card {
      background-color: var(--bg-card);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 12px;
    }

    .comment-card.reply {
      margin-left: 20px;
      border-left: 2px solid var(--primary);
      background-color: #161e2e;
    }

    .comment-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .comment-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background-color: #475569;
      object-fit: cover;
    }

    .comment-avatar-link {
      display: flex;
      flex: 0 0 auto;
      border-radius: 50%;
    }

    .comment-author {
      font-weight: 700;
      color: var(--text-main);
      text-decoration: none;
    }

    .comment-author:hover {
      text-decoration: underline;
    }

    .comment-time {
      font-size: 10px;
      color: #64748b;
    }

    .comment-text {
      color: #e2e8f0;
      word-break: break-word;
      line-height: 1.4;
    }

    .comment-attachment {
      margin-top: 4px;
      max-width: 180px;
      max-height: 140px;
      border-radius: 6px;
      border: 1px solid #475569;
      cursor: zoom-in;
    }

    .comment-attachment-link {
      display: inline-flex;
      align-self: flex-start;
    }

    #btn-clear-log {
      transition: color 0.2s;
    }
    #btn-clear-log:hover {
      color: var(--danger) !important;
    }

    /* Footer */
    .footer {
      padding: 16px;
      background-color: var(--bg-dark);
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <img src="image/logo_1.png" alt="FB Comment Scraper">
    </div>
    <div class="header-title">
      <h2>FB Comment Scraper</h2>
      <p id="scraping-indicator">พร้อมใช้งาน (ระบบ Side Panel)</p>
    </div>
  </div>

  <!-- Body Content -->
  <div class="panel-body">
    <!-- Active Page / Post Select Card -->
    <div class="connection-card">
      <div class="status-indicator">
        <span id="page-status-dot" class="status-dot"></span>
        <span id="page-status-text">ตรวจไม่พบหน้า Facebook</span>
      </div>
      <button id="btn-select-post" class="btn btn-select" disabled>
        🔍 เลือกโพสต์บนหน้า Facebook
      </button>
    </div>

    <!-- Scraping Options -->
    <div>
      <div class="section-title">ตัวเลือกการดึงข้อมูล</div>
      <div class="options-grid">
        <div class="option-item">
          <label for="opt-inline-button">แสดงปุ่มดึงความเห็นบน Facebook</label>
          <input type="checkbox" id="opt-inline-button" checked>
        </div>
        <div class="option-item">
          <label for="opt-expand">ขยายคอมเมนต์ย่อยทั้งหมด (Expand replies)</label>
          <input type="checkbox" id="opt-expand" checked>
        </div>
        <div class="option-item">
          <label for="opt-images">ดึงรูปภาพในคอมเมนต์ (Include images)</label>
          <input type="checkbox" id="opt-images" checked>
        </div>
        <div class="option-item">
          <label for="opt-limit">จำกัดจำนวนคอมเมนต์หลัก (0 = ไม่จำกัด)</label>
          <input type="number" id="opt-limit" min="0" value="0">
        </div>
        <div class="option-item">
          <label for="opt-delay">หน่วงเวลาคลิก (วินาที)</label>
          <input type="number" id="opt-delay" min="1" max="10" value="2">
        </div>
      </div>
    </div>

    <!-- Export Fields -->
    <div>
      <div class="section-title">หัวข้อข้อมูลที่ต้องการบันทึก</div>
      <div class="export-fields-menu">
        <button type="button" id="btn-toggle-fields" class="btn-export-fields" aria-expanded="false" aria-controls="export-fields-panel">
          <span>⚙ เลือกหัวข้อที่จะบันทึก</span>
          <span class="export-field-summary-meta">
            <span id="export-field-count" class="export-field-count"></span>
            <span id="export-field-chevron" aria-hidden="true">▼</span>
          </span>
        </button>
        <div id="export-fields-panel" class="export-fields-grid" hidden>
          <label class="export-field-item"><input type="checkbox" class="export-field" value="id" checked> ID</label>
          <label class="export-field-item"><input type="checkbox" class="export-field" value="type" checked> ประเภท</label>
          <label class="export-field-item"><input type="checkbox" class="export-field" value="name" checked> ชื่อผู้เขียน</label>
          <label class="export-field-item"><input type="checkbox" class="export-field" value="profileUrl" checked> ลิงก์โปรไฟล์</label>
          <label class="export-field-item"><input type="checkbox" class="export-field" value="timestamp" checked> เวลา</label>
          <label class="export-field-item"><input type="checkbox" class="export-field" value="text" checked> ข้อความ</label>
          <label class="export-field-item"><input type="checkbox" class="export-field" value="photoUrl" checked> ลิงก์รูปภาพ</label>
          <div class="export-field-actions">
            <button type="button" id="btn-fields-all" class="btn-field-action">เลือกทั้งหมด</button>
            <button type="button" id="btn-fields-default" class="btn-field-action">ค่าเริ่มต้น</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Control Buttons -->
    <div class="controls-row">
      <button id="btn-start" class="btn btn-primary" disabled>เริ่มดึงข้อมูล (Start)</button>
      <button id="btn-stop" class="btn btn-danger" disabled>หยุด (Stop)</button>
    </div>

    <!-- Statistics -->
    <div class="stats-container">
      <div class="stat-card">
        <div id="stat-total" class="stat-val">0</div>
        <div class="stat-lbl">ความเห็นทั้งหมด</div>
      </div>
      <div class="stat-card">
        <div id="stat-comments" class="stat-val">0</div>
        <div class="stat-lbl">สแกนเจอแล้ว</div>
      </div>
      <div class="stat-card">
        <div id="stat-images" class="stat-val">0</div>
        <div class="stat-lbl">รูปภาพที่พบ</div>
      </div>
    </div>

    <!-- Logger -->
    <div>
      <div class="section-title-row" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; margin-top: 4px;">
        <div class="section-title" style="margin: 0; padding: 0;">บันทึกการทำงาน (Logs)</div>
        <button id="btn-clear-log" style="background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 11px; text-decoration: underline; padding: 0; font-weight: 500; font-family: inherit;">ล้างบันทึก</button>
      </div>
      <div id="log-monitor" class="log-monitor">กรุณาเปิดหน้าเว็บ Facebook หรือกลุ่มเป้าหมาย...</div>
    </div>

    <!-- Live Preview -->
    <div class="preview-container">
      <div class="preview-title-row">
        <div class="section-title">ตัวอย่างคอมเมนต์สด (Live Preview)</div>
        <button type="button" id="btn-lock-preview" class="btn-lock-preview" aria-pressed="false" disabled>🔓 ล็อกผลลัพธ์</button>
      </div>
      <div id="preview-list" class="preview-list">
        <div class="preview-empty">ไม่มีข้อมูลดิบแสดงผล</div>
      </div>
    </div>
  </div>

  <!-- Export Actions -->
  <div class="footer">
    <button id="btn-export-csv" class="btn btn-export" disabled>ส่งออก Excel (CSV)</button>
    <button id="btn-export-json" class="btn btn-export" disabled>ส่งออก (JSON)</button>
  </div>

  <script src="scraper-core.js"></script>
  <script src="export-core.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
